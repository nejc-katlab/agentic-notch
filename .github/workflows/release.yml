name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build app
        run: scripts/build-app.sh "${GITHUB_REF_NAME#v}"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "AgentDock $GITHUB_REF_NAME" \
            --generate-notes \
            dist/AgentDock-*.zip dist/AgentDock-*.zip.sha256
